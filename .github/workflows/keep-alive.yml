name: Keep Alive

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - run: echo "$(date)" > KEEP_ALIVE
      
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - run: git add KEEP_ALIVE && git commit -m "Keep alive - $(date)" || true
      
      - run: git push
